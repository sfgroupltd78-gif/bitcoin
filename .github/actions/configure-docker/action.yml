name: 'Configure Docker'
description: 'Set up Docker build driver and configure build cache args'
inputs:
  cache-provider:
    description: 'gha or cirrus cache provider'
    required: true
runs:
  using: 'composite'
  steps:
    - name: Check inputs
      shell: bash
      run: |
        # We expect only gha or cirrus as inputs to cache-provider
        case "${{ inputs.cache-provider }}" in
          gha|cirrus)
            ;;
          *)
            echo "::warning title=Unknown input to configure docker action::Provided value was ${{ inputs.cache-provider }}"
            ;;
        esac

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        # Use host network to allow access to cirrus gha cache running on the host
        driver-opts: |
          network=host

    # This is required to allow buildkit to access the actions cache
    - name: Expose actions cache variables
      uses: actions/github-script@v6
      with:
        script: |
          Object.keys(process.env).forEach(function (key) {
            if (key.startsWith('ACTIONS_')) {
              core.info(`Exporting ${key}`);
              core.exportVariable(key, process.env[key]);
            }
          });

    - name: Construct docker build cache args
      shell: bash
      run: |
        # Configure docker build cache backend
        #
        # On forks the gha cache will work but will use Github's cache backend.
        # Docker will check for variables $ACTIONS_CACHE_URL, $ACTIONS_RESULTS_URL and $ACTIONS_RUNTIME_TOKEN
        # which are set automatically when running on GitHub infra: https://docs.docker.com/build/cache/backends/gha/#synopsis

        # Use cirrus cache host
        if [[ ${{ inputs.cache-provider }} == 'cirrus' ]]; then
          url_args="url=${CIRRUS_CACHE_HOST},url_v2=${CIRRUS_CACHE_HOST}"
        else
          url_args=""
        fi

        # Always optimistically --cache‑from in case a cache blob exists
        args=(--cache-from "type=gha${url_args:+,${url_args}},scope=${CONTAINER_NAME}")

        # Only add --cache-to when using the Cirrus cache provider and pushing to the default branch.
        if [[ ${{ inputs.cache-provider }} == 'cirrus' && ${{ github.event_name }} == "push" && ${{ github.ref_name }} == ${{ github.event.repository.default_branch }} ]]; then
          args+=(--cache-to "type=gha${url_args:+,${url_args}},mode=max,ignore-error=true,scope=${CONTAINER_NAME}")
        fi

        # Always `--load` into docker images (needed when using the `docker-container` build driver).
        args+=(--load)

        echo "DOCKER_BUILD_CACHE_ARG=${args[*]}" >> $GITHUB_ENV
#include <iostream>
#include <cstdlib>
#include <ctime>
#include <any>

// Importing items from the `util` namespace for `AnyPtr`
namespace util {
// Helper function to access and safely cast objects from std::any
template<typename T>
T* AnyPtr(const std::any& any) noexcept {
    T* const* ptr = std::any_cast<T*>(&any);
    return ptr ? *ptr : nullptr;
}
}

// Function to generate a random blockchain-style address
std::string generateAddress() {
    std::string chars = "0123456789abcdef";
    std::string address = "bc1"; // Bitcoin-style address starts with "bc1"

    // Generate a random address by appending random characters
    for (int i = 0; i < 39; i++) { // Length of address: 42 (including the "bc1")
        address += chars[rand() % chars.size()];
    }
    return address;
}

int main() {
    // Demonstrating util::AnyPtr with std::any
    std::any value = 42; // Store an int in std::any
    int* int_ptr = util::AnyPtr<int>(value);
    if (int_ptr) {
        std::cout << "Retrieved value from std::any: " << *int_ptr << std::endl; // Prints "42"
    } else {
        std::cout << "Type mismatch or no value" << std::endl;
    }

    // Generating and displaying a random blockchain wallet address
    srand(static_cast<unsigned int>(time(0))); // Seed randomness
    std::cout << "Generated Wallet Address: " << generateAddress() << std::endl;

    // Displaying hardcoded wallet addresses
    std::string Address1 = "bc1qh6mx9e6rkjq8pw7mpl8tfluxgd92p0chqpwwts";
    std::string Address2 = "bc1qav2she4qzrfful6vnll9x05sl02a5rmxcahnyg";
    std::string Address3 = "bc1qnvj80dr7etnrrlxpzdej5g4c7aeskp47k3787n";
    std::string address4 = "0x2e907840910285F959E3664569A576C8f973DdB3";

    std::cout << "Hardcoded Addresses:" << std::endl;
    std::cout << "Address1: " << Address1 << std::endl;
    std::cout << "Address2: " << Address2 << std::endl;
    std::cout << "Address3: " << Address3 << std::endl;
    std::cout << "Ethereum Address4: " << address4 << std::endl;

    return 0;
}